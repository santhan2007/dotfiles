# Hyprlock — hacker-themed login/lock screen
# Catppuccin Mocha palette: hacker-vibe dark with neon accents

source = ~/.config/hyprland/hyprland.conf  # so monitor config matches
$lock_gnome = hyprlock

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

# Big hacker-style text
label {
    monitor =
    text = $USER@$(hostname)
    color = rgb(c6a0f6)
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, 30
    halign = center
    valign = top
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(000000aa)
}

label {
    monitor =
    text = Hi there, $USER. Welcome back.
    color = rgb(cdd6f4)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 0, 90
    halign = center
    valign = top
    shadow_passes = 1
    shadow_size = 2
    shadow_color = rgb(00000088)
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span color='#fab387' size='xx-large' font_weight='bold'>$(date +%H:%M:%S)</span>"
    color = rgb(fab387)
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgb(000000cc)
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "<span color='#94e2d5' size='large'>$(date '+%A, %d %B %Y')</span>"
    color = rgb(94e2d5)
    font_size = 22
    font_family = JetBrains Mono Nerd Font
    position = 0, -110
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 380, 60
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.18
    fade_on_empty = true
    placeholder_text = <i>access key...</i>
    fail_text = <i>access denied</i>
    position = 0, 0
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgb(000000aa)

    # Theme colors
    color = rgb(cdd6f4)
    placeholder_color = rgb(7f849c)
    fail_color = rgb(f38ba8)
    inner_color = rgb(1e1e2e)
    check_color = rgb(a6e3a1)
    capslock_color = rgb(fab387)
    numlock_color = rgb(94e2d5)
    separator_color = rgb(585b70)

    font_family = JetBrains Mono Nerd Font
    font_size = 22
}

# Footer line
label {
    monitor =
    text = <span color='#6c7086'>[ authenticated session — all activity is logged ]</span>
    color = rgb(6c7086)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = bottom
}
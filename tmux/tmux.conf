# tmux — hacker config
# Catppuccin Mocha, prefix = Ctrl-Space, vi mode

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /usr/bin/bash

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Mouse
set -g mouse on

# Pane borders
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#c6a0f6
set -g pane-border-status top
set -ga pane-border-format "#{?#{>:#{pane-width},80},#[fg=#fab387]#{pane_title},#[fg=#cdd6f4]#{pane_title}}"

# Status bar
set -g status-style bg=#1e1e2e,fg=#cdd6f4
set -g status-interval 5
set -g status-left-length 32
set -g status-left "#[fg=#c6a0f6,bold] #{b:pane_current_path} "
set -g status-right "#[fg=#94e2d5] %Y-%m-%d %H:%M "

# Tabs
setw -g window-status-current-style fg=#c6a0f6,bold
setw -g window-status-style fg=#6c7086

# Truecolor
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Vi mode
setw -g mode-keys vi

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "config reloaded"

# Sane defaults
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
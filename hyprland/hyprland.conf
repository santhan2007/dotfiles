# santhan's Hyprland config — hacker aesthetic
# Animations: snappy, no bouncy flair. Performance over flash.

monitor=,preferred,auto,1

# ----- AUTOSTART -----
exec-once = waybar
exec-once = mako
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swww init
exec-once = swww img ~/.local/share/wallpapers/hacker.png

# ----- ENVIRONMENT -----
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ----- INPUT -----
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = rgb(c6a0f6) rgb(f5bde6) 45deg
    col.inactive_border = rgb(313244)

    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgb(00000088)
    }
}

animations {
    enabled = yes

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = fadeIn, 0.4, 0, 0.2, 1
    bezier = fadeOut, 0.4, 0, 0.2, 1

    animation = windows, 1, 5, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 6, winOut, slide
    animation = fade, 1, 7, fadeIn
    animation = fadeOut, 1, 7, fadeOut
    animation = workspaces, 1, 4, wind
}

gestures {
    workspace_swipe = yes
    workspace_swipe_fingers = 3
}

# ----- KEYBINDS -----
$mainMod = SUPER

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, L, exec, swaylock

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Volume / brightness
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ----- WINDOW RULES -----
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = opacity 0.9 0.9, class:^(kitty)$

layerrule = blur, mako
layerrule = ignorealpha 0.5, mako
layerrule = blur, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-notification-window
# Kitty terminal — hacker theme
# Catppuccin Mocha palette

font_family      JetBrains Mono Nerd Font
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic

font_size 13.0
adjust_line_height 110%
adjust_column_width 100%

# Catppuccin Mocha
background #1e1e2e
foreground #cdd6f4
cursor #f5e0dc
cursor_text_color #1e1e2e

selection_background #45475a
selection_foreground #cdd6f4

color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #c6a0f6
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #c6a0f6
color14 #94e2d5
color15 #a6adc8

# Window
window_padding_width 12
window_margin_width 4
window_decorations yes
hide_window_decorations yes

# Tabs
tab_bar_style powerline
tab_powerline_style angled
tab_title_template {title}{' :'}{num_windows}{' '}

# Behavior
scrollback_lines 10000
scrollback_pager less +F -R

# Cursor
cursor_shape beam
cursor_blink_interval 0.5

# URL handling
detect_urls yes
url_color #89b4fa
url_style curly

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Performance
repaint_delay 2
input_delay 2
sync_to_monitor yes